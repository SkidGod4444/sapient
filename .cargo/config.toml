[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.aarch64-apple-darwin]
# Link Metal framework for the optional MLX/GPU backend.
# NOTE: do NOT add -C target-cpu=native here — it causes ring's compile-time
# CPU-feature const assertions to fail on CI runners (GitHub macos-14 may have
# different feature flags than a local M-series Mac).
# NEON intrinsics use #[target_feature(enable = "neon")] which is always-on
# baseline on aarch64 and doesn't require target-cpu=native.
# To opt into native-CPU LLVM auto-vectorisation locally, run:
#   RUSTFLAGS="-C target-cpu=native" cargo build --release
rustflags = ["-C", "link-arg=-framework", "-C", "link-arg=Metal",
             "-C", "link-arg=-framework", "-C", "link-arg=Foundation"]

[target.'cfg(target_os = "macos")']
# Reserve headroom for Metal framework dylibs (Intel Mac / old linker compat).
# aarch64-apple-darwin has its own entry above; this is a no-op fallback.

[build]
# Parallel build jobs.
# jobs: leave unset to use all CPUs
