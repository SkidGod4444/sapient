[package]
name        = "sapient-cli"
description = "Command-line tool and HTTP server for the SAPIENT inference engine"
version.workspace    = true
edition.workspace    = true
authors.workspace    = true
license.workspace    = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "sapient"
path = "src/main.rs"

[dependencies]
sapient-core      = { workspace = true }
