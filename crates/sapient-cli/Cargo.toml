sapient-backends-cpu = { workspace = true }
sapient-scheduler = { workspace = true }
sapient-io        = { workspace = true }
sapient-telemetry = { workspace = true }
sapient-runtime   = { workspace = true }

thiserror   = { workspace = true }
tracing     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true }
clap        = { workspace = true }
axum        = { workspace = true }
tower       = { workspace = true }
tower-http  = { workspace = true }
anyhow      = { workspace = true }
