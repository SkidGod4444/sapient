name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # Trigger on version tags like v0.1.0

permissions:
  contents: write   # Needed to create GitHub Releases

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sapient

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-14           # ARM runner
            archive: tar.gz

          # macOS — Intel (cross-compiled on Apple Silicon runner — avoids macos-13 queue)
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz

          # Linux — x86_64 (glibc, covers Ubuntu/Debian/RHEL)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz

          # Linux — ARM64 (Raspberry Pi 4/5, cloud ARM)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true            # Use cross-rs for cross-compilation

          # Linux — ARMv7 (Raspberry Pi 3, 32-bit)
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-22.04
            archive: tar.gz
            cross: true

          # Windows — x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

          # Windows — ARM64 (Surface Pro X, modern Windows ARM)
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Cross-compilation setup (Linux non-native targets) ─────────────────
      - name: Install cross (for cross-compilation)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── macOS universal binary setup ───────────────────────────────────────
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux' && matrix.cross != true
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      # ── Build ──────────────────────────────────────────────────────────────
      # Windows must use pwsh so MSVC link.exe is on PATH (Git Bash does not inherit it).
      - name: Build (native — Windows)
        if: matrix.cross != true && runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Build (native — Linux/macOS)
        if: matrix.cross != true && runner.os != 'Windows'
        shell: bash
        run: cargo build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        shell: bash
        run: cross build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      # ── Strip binary (reduces size ~50-70%) ───────────────────────────────
      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext || '' }} || true

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          ARCHIVE="${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          $archive = "${{ env.BINARY_NAME }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8NoBOM

      # ── Checksum ──────────────────────────────────────────────────────────
      - name: Generate SHA256 checksum (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if command -v sha256sum > /dev/null; then
            sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          else
            shasum -a 256 "${{ env.ARCHIVE }}" | awk '{print $1, $2}' > "${{ env.ARCHIVE }}.sha256"
          fi
          cat "${{ env.ARCHIVE }}.sha256"

      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ env.ARCHIVE }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ env.ARCHIVE }}" | Out-File "${{ env.ARCHIVE }}.sha256" -Encoding ASCII
          Get-Content "${{ env.ARCHIVE }}.sha256"

      # ── Upload artifacts (passed to the release job) ───────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Extract changelog section for this version if CHANGELOG.md exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${{ steps.version.outputs.VERSION }}\]/,/^## \[/" CHANGELOG.md \
              | head -n -1 > release_notes.md
          else
            echo "See the [README](https://github.com/${{ github.repository }}#readme) for usage and documentation." > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SAPIENT ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v0.1.0-beta is pre-release
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
            install.sh
            install.ps1
