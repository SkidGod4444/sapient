name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # Trigger on version tags like v0.1.0

permissions:
  contents: write   # Needed to create GitHub Releases

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sapient

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-14           # ARM runner
            archive: tar.gz

          # macOS — Apple Silicon, Metal GPU build (MLX backend via `mlx` feature)
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            features: mlx
            suffix: -metal

          # macOS — Intel (cross-compiled on Apple Silicon runner — avoids macos-13 queue)
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz

          # macOS — Intel, cross-platform GPU build (wgpu → Metal). This is the GPU
          # path for Intel Macs (e.g. AMD Radeon / Intel iGPU), where the
          # Apple-Silicon-only MLX `-metal` build cannot run. wgpu uses Metal on
          # macOS, so it accelerates discrete and integrated GPUs alike.
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            features: wgpu
            suffix: -gpu

          # Linux — x86_64 (glibc, covers Ubuntu/Debian/RHEL)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz

          # Linux — x86_64, cross-platform GPU build (wgpu: Vulkan — Intel/AMD/Nvidia)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            features: wgpu
            suffix: -gpu

          # Linux — ARM64 (Pi 4/5 64-bit, cloud ARM). Built on a **native** ARM
          # runner (GitHub-hosted `ubuntu-22.04-arm`, GA since 2025) so cpal/ALSA
          # compiles and the default `audio-io` feature ships — i.e. `converse`
          # works on the Pi out of the box. (The old cargo-zigbuild cross path had
          # to drop audio-io because cross-compiling cpal's ALSA dep is fiddly;
          # building natively removes that constraint. The earlier native-ARM
          # flakiness was the preview pool — the GA runners are stable.)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            archive: tar.gz

          # Windows — x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

          # Windows — x86_64, cross-platform GPU build (wgpu: DX12 — Intel/AMD/Nvidia)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe
            features: wgpu
            suffix: -gpu

          # Windows — ARM64 (Surface Pro X, modern Windows ARM)
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # libasound2-dev: sapient-cli's default `audio-io` feature (live `converse`)
      # pulls cpal, which links libasound on Linux. Runs on every Linux job now,
      # including the native aarch64 (ARM) runner — so the Pi binary ships converse.
      - name: Install OpenSSL + ALSA (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev libasound2-dev

      # MLX (the Metal GPU backend) is built from source by mlx-rs and needs CMake.
      - name: Install MLX build deps (macOS Metal)
        if: matrix.features == 'mlx'
        run: brew install cmake

      # Configure the Metal (MLX) build environment. Scoped to the Metal matrix
      # entry so the plain CPU macOS binaries keep their macOS 11+ floor.
      - name: Configure Metal (MLX) build env
        if: matrix.features == 'mlx'
        run: |
          set -euo pipefail
          # 1) Pin the deployment target so Rust's linker and mlx-sys' cmake-built
          #    C++ objects agree on the min-OS version (avoids a version-min mismatch).
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"

          # 2) mlx-sys' C++ uses __builtin_available, which emits the compiler-rt
          #    builtin ___isPlatformVersionAtLeast. cmake-built objects don't link
          #    clang's runtime, and rustc doesn't either, so the symbol is undefined.
          #    Link libclang_rt.osx.a explicitly from the active Xcode toolchain.
          RT_LIB=$(find "$(dirname "$(xcrun --find clang)")/../lib/clang" -name 'libclang_rt.osx.a' 2>/dev/null | head -n1)
          if [ -z "$RT_LIB" ]; then
            echo "::error::could not locate libclang_rt.osx.a in the Xcode toolchain"
            exit 1
          fi
          echo "Linking clang runtime: $RT_LIB"
          echo "RUSTFLAGS=-L native=$(dirname "$RT_LIB") -l static=clang_rt.osx" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────────────────
      # Windows must use pwsh so MSVC link.exe is on PATH (Git Bash does not inherit it).
      - name: Build (native — Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ matrix.features }}") {
            cargo build --release -p sapient-cli --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }} --features "${{ matrix.features }}"
          } else {
            cargo build --release -p sapient-cli --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}
          }

      # All non-Windows targets (incl. native aarch64-linux on the ARM runner)
      # build with default features → `audio-io`/`converse` ships everywhere.
      - name: Build (native — Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release -p sapient-cli --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }} --features "$FEATURES"
          else
            cargo build --release -p sapient-cli --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}
          fi

      # ── Strip binary (reduces size ~50-70%) ───────────────────────────────
      # Every target now builds natively, so the host `strip` matches the arch.
      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext || '' }}"
          strip "$BIN" || true

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          BINARY="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          DIR="$(dirname "$BINARY")"
          ARCHIVE="${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.suffix }}.tar.gz"
          FILES="$(basename "$BINARY")"

          # The Metal build needs MLX's compiled shader library at runtime; MLX
          # loads it from next to the executable, so ship it inside the archive.
          # (Only the mlx feature produces a metallib; wgpu compiles its WGSL at runtime.)
          if [ "${{ matrix.features }}" = "mlx" ]; then
            METALLIB="$(find "target/${{ matrix.target }}/release" -name 'mlx.metallib' | head -n1)"
            if [ -z "$METALLIB" ]; then
              echo "::error::Metal build produced no mlx.metallib"
              exit 1
            fi
            echo "Bundling $METALLIB"
            cp "$METALLIB" "$DIR/mlx.metallib"
            FILES="$FILES mlx.metallib"
          fi

          tar czf "$ARCHIVE" -C "$DIR" $FILES
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          $archive = "${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.suffix }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8NoBOM

      # ── Checksum ──────────────────────────────────────────────────────────
      - name: Generate SHA256 checksum (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if command -v sha256sum > /dev/null; then
            sha256sum "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"
          else
            shasum -a 256 "${{ env.ARCHIVE }}" | awk '{print $1, $2}' > "${{ env.ARCHIVE }}.sha256"
          fi
          cat "${{ env.ARCHIVE }}.sha256"

      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ env.ARCHIVE }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ env.ARCHIVE }}" | Out-File "${{ env.ARCHIVE }}.sha256" -Encoding ASCII
          Get-Content "${{ env.ARCHIVE }}.sha256"

      # ── Upload artifacts (passed to the release job) ───────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.suffix }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Extract changelog section for this version if CHANGELOG.md exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${{ steps.version.outputs.VERSION }}\]/,/^## \[/" CHANGELOG.md \
              | head -n -1 > release_notes.md
          else
            echo "See the [README](https://github.com/${{ github.repository }}#readme) for usage and documentation." > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SAPIENT ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v0.1.0-beta is pre-release
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
            install.sh
            install.ps1

  # ── Mirror binaries to public distribution repo ────────────────────────────
  release-dist:
    name: Mirror → openstackhq/sapient
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for install scripts)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lah artifacts/

      - name: Push release to distribution repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_DIST }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Collect artifact paths
          ASSETS=$(find artifacts -type f | sort)

          # Add install scripts if present
          [ -f install.sh ]  && ASSETS="$ASSETS install.sh"
          [ -f install.ps1 ] && ASSETS="$ASSETS install.ps1"

          RELEASE_NOTES="Binary distribution for SAPIENT ${TAG}.

          Full source, changelog, and docs: https://github.com/SkidGod4444/sapient"

          # Create the release; if it already exists upload assets to it instead.
          if gh release view "$TAG" --repo openstackhq/sapient &>/dev/null; then
            echo "Release $TAG already exists on distribution repo — uploading assets"
            # shellcheck disable=SC2086
            gh release upload "$TAG" \
              --repo openstackhq/sapient \
              --clobber \
              $ASSETS
          else
            echo "Creating release $TAG on distribution repo"
            # shellcheck disable=SC2086
            gh release create "$TAG" \
              --repo openstackhq/sapient \
              --title "SAPIENT $TAG" \
              --notes "$RELEASE_NOTES" \
              $ASSETS
          fi
