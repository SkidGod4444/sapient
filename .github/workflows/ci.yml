name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format + Clippy ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Tests on macOS (arm64 + x86_64) ─────────────────────────────────────────
  test-macos:
    name: Test (macOS)
    strategy:
      matrix:
        os: [macos-14, macos-13]   # arm64 and x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  # ── Build on Windows x86_64 ──────────────────────────────────────────────────
  test-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        shell: pwsh
        run: cargo build --release --bin sapient

  # ── Tests on Linux x86_64 ────────────────────────────────────────────────────
  test-linux:
    name: Test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ── Cross-compile check for ARM64 (Raspberry Pi) ─────────────────────────────
  cross-rpi:
    name: Cross-compile (aarch64-linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation toolchain
        run: |
          sudo dpkg --add-architecture arm64
          # Patch all possible sources to ports.ubuntu.com for ARM64
          sudo sed -i 's|http://archive.ubuntu.com|http://ports.ubuntu.com|g' /etc/apt/sources.list
          sudo sed -i 's|http://security.ubuntu.com|http://ports.ubuntu.com|g' /etc/apt/sources.list
          sudo sed -i 's|http://archive.ubuntu.com|http://ports.ubuntu.com|g' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's|http://security.ubuntu.com|http://ports.ubuntu.com|g' /etc/apt/sources.list.d/*.list 2>/dev/null || true

          # Give apt more retries for reliability
          for i in {1..5}; do
            sudo apt-get update && break || ([ $i -lt 5 ] && sleep $((2**i)) || exit 1)
          done
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 pkg-config
      - name: Check (not build — no runner available)
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          OPENSSL_INCLUDE_DIR: /usr/include/aarch64-linux-gnu
          OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
        run: cargo check --workspace --target aarch64-unknown-linux-gnu

  # ── Documentation build ──────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
