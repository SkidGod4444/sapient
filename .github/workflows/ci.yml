name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Auto-format ──────────────────────────────────────────────────────────────
  # Runs `cargo fmt --all` and commits any formatting changes back to the branch.
  # Only runs on push (not PRs, to avoid permission issues on forks).
  auto-fmt:
    name: Auto-format
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo fmt
        run: cargo fmt --all
      - name: Commit formatting fixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: cargo fmt auto-format [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  # ── Clippy (enforced, no continue-on-error) ──────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: auto-fmt
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # ALSA dev headers: sapient-cli's default `audio-io` feature pulls cpal,
      # which links libasound on Linux.
      - run: sudo apt-get update -q && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Tests on macOS (arm64 + x86_64 cross-compile) ─────────────────────────────
  test-macos:
    name: Test (macOS)
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }} -- --test-threads=1

  # ── Build on Windows x86_64 ──────────────────────────────────────────────────
  test-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        shell: pwsh
        run: cargo build --release --bin sapient

  # ── Tests on Linux x86_64 ────────────────────────────────────────────────────
  test-linux:
    name: Test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update -q && sudo apt-get install -y libasound2-dev
      - run: cargo test --workspace -- --test-threads=1

  # ── Cross-compile check for ARM64 (Raspberry Pi / DGX Spark) ─────────────────
  cross-rpi:
    name: Cross-compile (aarch64-linux)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install OpenSSL + ALSA (ARM64 Linux)
        run: sudo apt-get update -q && sudo apt-get install -y pkg-config libssl-dev libasound2-dev
      - name: Check (native ARM64 runner)
        run: cargo check --workspace --target aarch64-unknown-linux-gnu

  # ── Documentation build ──────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update -q && sudo apt-get install -y libasound2-dev
      - run: cargo doc --workspace --no-deps

  # ── Mobile packaging (Phase 11) ──────────────────────────────────────────────
  # Builds the real artifacts consumers get: the Apple XCFramework + Swift
  # Package (plus a compiled-and-RUN macOS smoke binary against the packaged
  # static lib) and the Android Gradle module (arm64 .so + generated Kotlin,
  # uniffi exports verified). Slow-ish cold (release profile ×
  # several targets) — rust-cache keeps warm runs reasonable.
  package-swift:
    name: Package (Swift/Apple)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
      - name: Package + smoke test
        run: ./scripts/package-swift.sh --smoke
      - name: Build macOS example app
        run: swift build --package-path examples/swift-chat
      - name: Build iOS example app (simulator)
        run: |
          brew install xcodegen
          cd examples/swift-chat
          xcodegen
          xcodebuild -project SapientChat.xcodeproj -scheme SapientChatApp \
            -destination 'generic/platform=iOS Simulator' build CODE_SIGNING_ALLOWED=NO
      - uses: actions/upload-artifact@v4
        with:
          name: sapient-swift
          path: dist/mobile/sapient-swift.zip
          retention-days: 7

  package-android:
    name: Package (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Package
        run: ./scripts/package-android.sh
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build Compose example app
        working-directory: examples/android-chat
        run: ./gradlew :app:assembleDebug --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: sapient-android
          path: dist/mobile/sapient-android.zip
          retention-days: 7

  # ── TypeScript SDK (sdks/typescript) ─────────────────────────────────────────
  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          # npm lifecycle scripts run arbitrary code — don't let them see the token.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - run: npm ci
      - run: npm test
      - name: React Native example — typecheck + headless bundle
        working-directory: examples/react-native-chat
        run: |
          npm ci
          npm run typecheck
          npm run bundle:check
